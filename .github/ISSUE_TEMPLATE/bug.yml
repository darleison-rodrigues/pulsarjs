name: Bug Report
description: Report an issue or bug with PulsarJS SDK or data capture
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue with PulsarJS! Please provide as much detail as possible to help us reproduce the problem.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior. If possible, provide a minimal reproducible example.
      placeholder: |
        1. Initialize SDK with...
        2. Perform action...
        3. See error...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: PulsarJS Version
      description: Which version of the SDK are you using?
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where are you using PulsarJS?
      options:
        - SFCC PWA Kit
        - SFCC SiteGenesis
        - Custom Platform
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      description: What browser and operating system are you using?
      placeholder: Chrome 120 on macOS Sonoma
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Console Logs / Network Responses
      description: Please paste any relevant console logs or network request/response details. Be sure to remove or redact any sensitive PII.
      render: shell
    validations:
      required: false
