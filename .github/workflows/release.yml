name: Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "9"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @pulsarjs/sdk build

      - name: Bundle size check (max 25KB gzip)
        run: |
          GZIP_SIZE=$(gzip -c packages/sdk/dist/pulsar.js | wc -c)
          GZIP_KB=$(echo "scale=1; $GZIP_SIZE / 1024" | bc)
          echo "::notice::Bundle size: ${GZIP_KB}KB gzip (${GZIP_SIZE} bytes)"
          if [ "$GZIP_SIZE" -gt 25600 ]; then
            echo "::error::Bundle exceeds 25KB gzip limit (${GZIP_KB}KB)"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/sdk/dist/pulsar.js
            packages/sdk/dist/pulsar.js.map
          generate_release_notes: true
