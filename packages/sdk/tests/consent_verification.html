<!DOCTYPE html>
<html>

<head>
    <title>PulsarJS Consent Verification</title>
</head>

<body>
    <h1>PulsarJS Consent Test</h1>
    <div id="logs"></div>
    <div id="status">Running tests...</div>

    <script type="module">
        import PulsarJS from '../src/pulsar.js';

        // Mock Fetch
        window.fetches = [];
        const originalFetch = window.fetch;
        window.fetch = async (url, options) => {
            if (url.includes('/ingest')) {
                window.fetches.push({ url, options });
                return new Response('{"status":"ok"}', { status: 200 });
            }
            return originalFetch(url, options);
        };

        function log(msg) {
            const div = document.createElement('div');
            div.textContent = msg;
            document.getElementById('logs').appendChild(div);
            console.log(msg);
        }

        async function runTests() {
            try {
                // Test 1: Default Init (Disabled)
                log('1. Testing Default Init...');
                window.fetches = []; // Reset
                PulsarJS.init({ clientId: 'test-client' });

                if (PulsarJS.enabled) throw new Error('PulsarJS should be disabled by default!');

                await PulsarJS._capture({ message: 'Test 1' });
                if (window.fetches.length > 0) throw new Error('Capture ran while disabled!');
                log('PASS: Default Init (Disabled)');

                // Test 2: Enable
                log('2. Testing Enable()...');
                PulsarJS.enable();
                if (!PulsarJS.enabled) throw new Error('PulsarJS should be enabled!');

                await PulsarJS._capture({ message: 'Test 2', severity: 'error' });
                // We mock _capture is async in our mental model, but it calls fetch which is async.
                // _capture itself is async.

                if (window.fetches.length === 0) throw new Error('Capture failed while enabled!');
                log('PASS: Enable() works');

                // Test 3: Disable
                log('3. Testing Disable()...');
                window.fetches = [];
                PulsarJS.disable();
                if (PulsarJS.enabled) throw new Error('PulsarJS should be disabled!');

                await PulsarJS._capture({ message: 'Test 3' });
                if (window.fetches.length > 0) throw new Error('Capture ran after disable()!');
                log('PASS: Disable() works');

                // Test 4: Check DNT logic (Manual Mock)
                // Hard to mock navigator.doNotTrack reliably in all browsers writable wise, 
                // but we can check the logic in code review.
                // Here we just check properties.

                document.getElementById('status').textContent = 'ALL TESTS PASSED';
                document.getElementById('status').style.color = 'green';

            } catch (e) {
                log('FAIL: ' + e.message);
                document.getElementById('status').textContent = 'TESTS FAILED';
                document.getElementById('status').style.color = 'red';
            }
        }

        // Wait a bit for init interactions
        setTimeout(runTests, 100);

    </script>
</body>

</html>
