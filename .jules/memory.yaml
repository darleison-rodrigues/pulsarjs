- id: mem-001
  domain: architecture
  trigger: History API patching, SPA navigation, route change detection
  pattern: navigation.js is the single owner of History API patches. Other collectors must NOT patch History independently. They listen to pulsar:route-change CustomEvent.
  implication: Never add a second History API patch — listen to pulsar:route-change
  source: medic
  confirmed: 2026-03-20
  recurrence: 1
  success_count: 0
  failure_count: 0
  last_used: 2026-03-20
  weight: 1.0

- id: mem-002
  domain: documentation
  trigger: "Compare docs/API.md init signature and config options with actual validation in packages/sdk/src/index.js or packages/sdk/src/core/config.js."
  pattern: >
    The documentation for `Pulsar.init(config)` was missing several configuration options
    (`enabled`, `allowUnconfirmedConsent`, `nonce`) that are present in the core configuration (`DEFAULT_CONFIG` in `packages/sdk/src/core/config.js`).
  implication: "Always ensure docs reflect the exact config accepted by `validateConfig` and the `DEFAULT_CONFIG`."
  source: scribe
  confirmed: 2026-03-24
  recurrence: 1
