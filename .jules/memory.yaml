- id: mem-001
  domain: architecture
  trigger: History API patching, SPA navigation, route change detection
  pattern: navigation.js is the single owner of History API patches. Other collectors must NOT patch History independently. They listen to pulsar:route-change CustomEvent.
  implication: Never add a second History API patch — listen to pulsar:route-change
  source: medic
  confirmed: 2026-03-20
  recurrence: 1
  success_count: 0
  failure_count: 0
  last_used: 2026-03-20
  weight: 1.0

- id: mem-002
  domain: security
  trigger: when validating user-supplied endpoint configuration in config.js
  pattern: >
    Endpoint validation in config.js line 47 uses startsWith('https://') check only.
    This is vulnerable to URL auth injection attacks: https://evil.com@api.pulsarjs.com
    would pass validation but sendBeacon(endpoint, blob) in capture.js line 359 would
    send traffic to evil.com instead of api.pulsarjs.com. Browser resolves credentials
    in URL and routes authentically.
  implication: Always use URL constructor to parse and validate endpoints; check protocol and parse host separately, never rely on string startsWith() for security-sensitive URLs.
  source: manual-review
  confirmed: 2026-03-23
  recurrence: 1
  success_count: 0
  failure_count: 0
  last_used: 2026-03-23
  weight: 1.0
